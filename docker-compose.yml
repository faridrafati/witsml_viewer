# ════════════════════════════════════════════════════════════════════════
#  WITSML Mudlogging Monitor — full testable stack.
#  `docker compose up` brings up: postgres, redis, mockstore (in-house WITSML
#  1.4.1.1 SOAP test server), api (FastAPI BFF), simulator (20-well feed),
#  web (React/Vite).
#
#  mockstore replaces the previous Drillflow container (which turned out to be
#  a cloud proxy, not a self-contained store). It speaks the same SOAP 1.1
#  document/literal WMLS contract the backend's zeep client expects and is
#  verified end-to-end against app.witsml.client (see mockstore/).
# ════════════════════════════════════════════════════════════════════════
name: witsml-mudlogging

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: witsml
      POSTGRES_PASSWORD: witsml
      POSTGRES_DB: witsml
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U witsml -d witsml"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  # In-house, self-contained WITSML 1.4.1.1 SOAP store (FastAPI + lxml). The
  # default test server: an in-memory store that reuses backend/app.witsml.*
  # constants/parse so it stays faithful to the same contracts the client and
  # parser enforce. Serves the Store WSDL at /witsml/store?wsdl on :7070.
  mockstore:
    build:
      context: .
      dockerfile: mockstore/Dockerfile
    environment:
      MOCK_STORE_PATH: /witsml/store
    ports:
      - "7070:7070"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:7070/witsml/store?wsdl >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 10s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      # Compose-internal hostnames override .env localhost values.
      DATABASE_URL: postgresql+asyncpg://witsml:witsml@postgres:5432/witsml
      REDIS_URL: redis://redis:6379/0
      WITSML_URL: http://mockstore:7070/witsml/store
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mockstore:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 25s

  # Perpetual test rig: creates 20 wells and appends a row to every log @5s.
  simulator:
    build:
      context: .
      dockerfile: simulator/Dockerfile
    env_file:
      - .env
    environment:
      WITSML_URL: http://mockstore:7070/witsml/store
    depends_on:
      mockstore:
        condition: service_healthy
      api:
        condition: service_started
    restart: on-failure

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      # REST is mounted under /api; the WS hub is at the root (/ws).
      VITE_API_BASE_URL: http://localhost:8000/api
      VITE_WS_BASE_URL: ws://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      api:
        condition: service_started

volumes:
  pgdata:
